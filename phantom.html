<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>PHANTOM</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}canvas{display:block;cursor:none;image-rendering:pixelated;transform-origin:center center}</style>
</head><body>
<canvas id="g"></canvas>
<div id="seed-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;align-items:center;justify-content:center;background:rgba(0,0,12,.9);z-index:10;">
  <form id="seed-form" style="display:flex;flex-direction:column;align-items:center;gap:14px;font-family:monospace;">
    <div style="font-size:22px;color:#0f8;text-shadow:0 0 12px #0f8;letter-spacing:2px;">SET SEED</div>
    <div style="font-size:11px;color:#556;letter-spacing:1px;">up to 8 hex digits &mdash; leave blank for RANDOM</div>
    <input id="seed-input" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" maxlength="8"
      style="background:#000d08;color:#0f8;border:1.5px solid #0f8;font-family:monospace;font-size:26px;text-align:center;padding:10px 18px;width:220px;letter-spacing:4px;outline:none;text-transform:uppercase;"
      placeholder="RANDOM">
    <div id="seed-error" style="color:#f84;font-size:11px;min-height:14px;"></div>
    <div style="display:flex;gap:12px;">
      <button type="submit" style="background:#000d08;color:#0f8;border:1.5px solid #0f8;font-family:monospace;font-size:13px;padding:8px 22px;cursor:pointer;letter-spacing:1px;">CONFIRM</button>
      <button type="button" id="seed-cancel" style="background:#000d08;color:#446;border:1.5px solid #446;font-family:monospace;font-size:13px;padding:8px 22px;cursor:pointer;letter-spacing:1px;">CANCEL</button>
    </div>
  </form>
</div>
<script src="util.js"></script>
<script src="data/weapons.js"></script>
<script src="data/ships.js"></script>
<script src="enemy-ai.js"></script>
<script src="data/enemies.js"></script>
<script src="data/fleets.js"></script>
<script src="defenses.js"></script>
<script src="encounter-enemies.js"></script>
<script src="gen.js"></script>
<script src="data/levels.js"></script>
<script src="save.js"></script>
<script src="audio.js"></script>
<script src="input.js"></script>
<script src="draw.js"></script>
<script src="state.js"></script>
<script src="menu-ui.js"></script>
<script src="overworld.js"></script>
<script src="encounter.js"></script>
<script src="site.js"></script>
<script src="base.js"></script>
<script src="rebuild-menu.js"></script>
<script src="menus.js"></script>
<script src="main.js"></script>
<script>
function resizeCanvas(){
  var c=document.getElementById('g');
  var max=document.fullscreenElement?Infinity:1;
  var s=Math.min(max,window.innerWidth/800,window.innerHeight/580);
  c.style.transform='scale('+s+')';
}
window.addEventListener('resize',resizeCanvas);
document.addEventListener('fullscreenchange',function(){
  resizeCanvas();
  if(typeof G!=='undefined')G.fullscreen=!!document.fullscreenElement;
});
resizeCanvas();
</script>
</body></html>
