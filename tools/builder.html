<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Phantom Graphics Builder</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #222;
    --border: #333;
    --text: #ddd;
    --muted: #888;
    --accent: #6cf;
    --warn: #fc6;
    --err: #f66;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px system-ui, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }
  header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header select { background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 3px 6px; border-radius: 3px; }
  main {
    display: grid;
    grid-template-columns: 320px 1fr 360px;
    overflow: hidden;
  }
  section {
    padding: 10px 12px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }
  section:last-child { border-right: none; }
  section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; }
  hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  label { display: block; margin: 6px 0; font-size: 12px; }
  label > input[type=checkbox] { margin-right: 6px; vertical-align: middle; }
  input[type=text], input[type=number], textarea, select {
    background: #111;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 6px;
    border-radius: 3px;
    font: inherit;
    width: 100%;
  }
  input[type=number] { width: 90px; }
  input[type=color] { width: 40px; height: 22px; vertical-align: middle; padding: 0; border: 1px solid var(--border); background: #111; }
  input[type=range] { width: calc(100% - 50px); vertical-align: middle; }
  textarea { font-family: ui-monospace, Consolas, monospace; font-size: 12px; resize: vertical; }
  button {
    background: #2a2a2a;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    font: inherit;
  }
  button:hover { background: #333; }
  button:active { background: #444; }
  details { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 3px; }
  details > summary { padding: 5px 8px; cursor: pointer; background: var(--panel); user-select: none; font-weight: 600; }
  details > *:not(summary) { padding: 0 8px; }
  details > div, details > label, details > ul { padding-left: 8px; padding-right: 8px; }
  details > label:last-child, details > div:last-child, details > ul:last-child { padding-bottom: 8px; }
  .preview-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #111;
  }
  #preview {
    background: #000;
    border: 1px solid var(--border);
    cursor: crosshair;
    margin-top: 4px;
  }
  .preview-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 14px;
    width: 100%;
    max-width: 500px;
    margin-top: 10px;
    font-size: 12px;
  }
  .preview-controls label { margin: 2px 0; }
  .warnings { margin-top: 10px; }
  .warnings .warn { color: var(--warn); font-size: 11px; padding: 4px 6px; background: rgba(255,200,80,0.06); border: 1px solid rgba(255,200,80,0.2); border-radius: 3px; margin-bottom: 4px; }
  .warnings .err { color: var(--err); font-size: 11px; padding: 4px 6px; background: rgba(255,80,80,0.06); border: 1px solid rgba(255,80,80,0.3); border-radius: 3px; margin-bottom: 4px; }
  #parts-list { list-style: none; padding: 0 8px 8px; margin: 0; }
  #parts-list li { display: flex; align-items: center; gap: 6px; padding: 3px 0; border-bottom: 1px dashed #2c2c2c; font-size: 11px; }
  #parts-list li:last-child { border-bottom: none; }
  #parts-list .pname { flex: 1; color: var(--muted); }
  .val { display: inline-block; min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); margin-left: 4px; }
  footer {
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    max-height: 280px;
  }
  .output-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .output-header h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0; flex: 1; }
  #output { flex: 1; min-height: 140px; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; }
</style>
</head>
<body>

<header>
  <h1>Phantom Graphics Builder</h1>
  <label style="margin:0">Type
    <select id="graphic-type">
      <option value="enemy">Enemy</option>
      <option value="player-ship" disabled>Player Ship (coming soon)</option>
    </select>
  </label>
</header>

<main>

  <section class="input-col">
    <h2>Input</h2>

    <label>Paste SVG
      <textarea id="svg-input" rows="9" placeholder="<svg viewBox='0 0 40 40'>&#10;  <path d='M20 4 L4 28 L36 28 Z'/>&#10;</svg>"></textarea>
    </label>
    <input id="svg-file-input" type="file" accept=".svg,image/svg+xml" style="display:none">
    <button id="pick-svg-file">Choose SVG File</button>
    <button id="parse-svg">Parse SVG</button>

    <hr>

    <label>Or paste an existing enemy entry
      <textarea id="enemy-input" rows="6" placeholder="{ id:'morrigan', col:'#ffaa33', col2:'#ff7700', hull:{...}, ..., drawEnc(e){...} }"></textarea>
    </label>
    <button id="load-enemy">Load Enemy</button>

    <hr>

    <button id="reset">Reset All</button>

    <div id="warnings" class="warnings"></div>
  </section>

  <section class="preview-col">
    <h2 style="align-self:flex-start">Preview (1:1 game pixels)</h2>
    <canvas id="preview" width="500" height="500"></canvas>
    <div class="preview-controls">
      <label><input type="checkbox" id="auto-rotate" checked> Auto-rotate</label>
      <label><input type="checkbox" id="show-bounds" checked> Show boundsR</label>
      <label>Manual rotation
        <input type="range" id="rotation" min="0" max="360" value="0" step="1">
        <span class="val" id="rotation-val">0&deg;</span>
      </label>
      <label><input type="checkbox" id="show-collision-poly"> Show collision polygon</label>
      <label>def.scale
        <input type="number" id="def-scale" min="0.1" max="3" step="0.05" value="1">
      </label>
      <label>Rotation speed
        <input type="range" id="spin-rate" min="0" max="2" step="0.05" value="0.3">
        <span class="val" id="spin-rate-val">0.30</span>
      </label>
    </div>
  </section>

  <section class="controls-col">
    <h2>Controls</h2>

    <details open>
      <summary>Curves</summary>
      <label>Mode
        <select id="curve-mode">
          <option value="polygon">Polygon (flatten)</option>
          <option value="curves">Preserve curves</option>
        </select>
      </label>
      <label>Flatten tolerance
        <input type="range" id="tolerance" min="0.05" max="3" step="0.05" value="0.5">
        <span class="val" id="tolerance-val">0.50</span>
      </label>
    </details>

    <details open>
      <summary>Hull</summary>
      <label>Angle mode
        <select id="hull-angle">
          <option value="spin">spin</option>
          <option value="combat">combat</option>
          <option value="flight">flight</option>
          <option value="none">none</option>
        </select>
      </label>
      <label>boundsR
        <input type="number" id="bounds-r" value="16" min="1" step="0.5">
      </label>
      <label>Target size scale
        <input type="range" id="target-size" min="0.1" max="4" step="0.05" value="1">
        <span class="val" id="target-size-val">1.00</span>
      </label>
      <label><input type="checkbox" id="auto-center" checked> Auto-center on origin</label>
      <label>Input rotation (re-orient SVG; 0 = nose up)
        <input type="range" id="input-rotation" min="-180" max="180" value="0" step="1">
        <span class="val" id="input-rotation-val">0&deg;</span>
      </label>
    </details>

    <details open>
      <summary>Colors</summary>
      <label>col (primary) <input type="color" id="col" value="#ffdd33"></label>
      <label>col2 (secondary) <input type="color" id="col2" value="#ff8800"></label>
    </details>

    <details open>
      <summary>Stroke</summary>
      <label>Line width
        <input type="range" id="line-width" min="0.5" max="4" step="0.1" value="1.5">
        <span class="val" id="line-width-val">1.5</span>
      </label>
      <label>Shadow blur (sb)
        <input type="range" id="shadow-blur" min="0" max="24" step="1" value="10">
        <span class="val" id="shadow-blur-val">10</span>
      </label>
    </details>

    <details open>
      <summary>Parts (per-part visibility &amp; color)</summary>
      <ul id="parts-list"><li><span class="pname">No parts loaded</span></li></ul>
    </details>
  </section>

</main>

<footer>
  <div class="output-header">
    <h2>Output (paste into ENEMY_CLASSES)</h2>
    <button id="copy-output">Copy</button>
  </div>
  <textarea id="output" readonly></textarea>
</footer>

<script>
'use strict';

/* =========================================================================
 *  STATE
 * ======================================================================= */

const state = {
  graphicType: 'enemy',
  curveMode: 'polygon',         // 'polygon' | 'curves'
  tolerance: 0.5,
  hullAngle: 'spin',            // 'spin' | 'combat' | 'flight' | 'none'
  boundsR: 16,
  targetSize: 1.0,
  autoCenter: true,
  inputRotationDeg: 0,
  col: '#ffdd33',
  col2: '#ff8800',
  lineWidth: 1.5,
  shadowBlur: 10,
  parts: [],                    // see PART SHAPE below
  preview: {
    autoRotate: true,
    rotationDeg: 0,
    showBounds: true,
    showCollisionPoly: false,
    defScale: 1.0,
    spinRate: 0.3,              // radians/sec
  },
  warnings: [],
};

/* PART SHAPE
 *   common: { color: 'col'|'col2', visible: true, _src: {...} }
 *   _src holds the original (untransformed-by-target-size) data so size/rotation
 *   sliders can re-derive the part without losing precision.
 *
 *   primitive parts (auto-detected from <circle>, <rect>, <ellipse>):
 *     { kind:'circle',  cx, cy, r }
 *     { kind:'ellipse', cx, cy, rx, ry }
 *     { kind:'rect',    x, y, w, h }
 *   polygon parts (from <path>, <polygon>, <polyline>, <line>, etc.):
 *     { kind:'poly', pts: [[x,y], ...] }
 *   curves-mode parts (only present when curve-mode=='curves'):
 *     { kind:'curvepath', subpath: [['M',x,y],['C',x1,y1,x2,y2,x,y],...,['Z']?] }
 */

/* =========================================================================
 *  DOM
 * ======================================================================= */

const $ = (id) => document.getElementById(id);
const els = {
  svgInput: $('svg-input'),
  svgFileInput: $('svg-file-input'),
  enemyInput: $('enemy-input'),
  pickSvgFileBtn: $('pick-svg-file'),
  parseBtn: $('parse-svg'),
  loadBtn: $('load-enemy'),
  resetBtn: $('reset'),
  warnings: $('warnings'),
  preview: $('preview'),
  graphicType: $('graphic-type'),
  curveMode: $('curve-mode'),
  tolerance: $('tolerance'),
  toleranceVal: $('tolerance-val'),
  hullAngle: $('hull-angle'),
  boundsR: $('bounds-r'),
  targetSize: $('target-size'),
  targetSizeVal: $('target-size-val'),
  autoCenter: $('auto-center'),
  inputRotation: $('input-rotation'),
  inputRotationVal: $('input-rotation-val'),
  col: $('col'),
  col2: $('col2'),
  lineWidth: $('line-width'),
  lineWidthVal: $('line-width-val'),
  shadowBlur: $('shadow-blur'),
  shadowBlurVal: $('shadow-blur-val'),
  partsList: $('parts-list'),
  output: $('output'),
  copyBtn: $('copy-output'),
  autoRotate: $('auto-rotate'),
  rotation: $('rotation'),
  rotationVal: $('rotation-val'),
  showBounds: $('show-bounds'),
  showCollisionPoly: $('show-collision-poly'),
  defScale: $('def-scale'),
  spinRate: $('spin-rate'),
  spinRateVal: $('spin-rate-val'),
};

/* =========================================================================
 *  AFFINE 2D MATRICES  [a, b, c, d, e, f] => x' = a*x + c*y + e, y' = b*x + d*y + f
 * ======================================================================= */

const M = {
  identity:  () => [1, 0, 0, 1, 0, 0],
  translate: (tx, ty) => [1, 0, 0, 1, tx, ty],
  scale:     (sx, sy = sx) => [sx, 0, 0, sy, 0, 0],
  rotate:    (rad) => { const c=Math.cos(rad), s=Math.sin(rad); return [c, s, -s, c, 0, 0]; },
  multiply:  (A, B) => [
    A[0]*B[0] + A[2]*B[1],
    A[1]*B[0] + A[3]*B[1],
    A[0]*B[2] + A[2]*B[3],
    A[1]*B[2] + A[3]*B[3],
    A[0]*B[4] + A[2]*B[5] + A[4],
    A[1]*B[4] + A[3]*B[5] + A[5],
  ],
  apply: (m, x, y) => [m[0]*x + m[2]*y + m[4], m[1]*x + m[3]*y + m[5]],
  // returns true if matrix has only translation, uniform scale, and rotation (no skew)
  hasNoSkew: (m) => Math.abs(m[0]*m[2] + m[1]*m[3]) < 1e-6,
  scaleX: (m) => Math.hypot(m[0], m[1]),
  scaleY: (m) => Math.hypot(m[2], m[3]),
  // is it pure translation (+ optional uniform scale, no rotation)?
  hasNoRotation: (m) => Math.abs(m[1]) < 1e-6 && Math.abs(m[2]) < 1e-6,
};

function parseTransformAttribute(str) {
  let m = M.identity();
  const re = /(matrix|translate|scale|rotate|skewX|skewY)\s*\(([^)]*)\)/g;
  let mm;
  while ((mm = re.exec(str))) {
    const name = mm[1];
    const args = mm[2].split(/[\s,]+/).filter(s => s.length).map(Number);
    let next;
    if (name === 'matrix') {
      next = [args[0], args[1], args[2], args[3], args[4], args[5]];
    } else if (name === 'translate') {
      next = M.translate(args[0] || 0, args[1] || 0);
    } else if (name === 'scale') {
      next = M.scale(args[0] || 1, args.length > 1 ? args[1] : (args[0] || 1));
    } else if (name === 'rotate') {
      const a = (args[0] || 0) * Math.PI / 180;
      if (args.length === 3) {
        next = M.multiply(M.translate(args[1], args[2]), M.multiply(M.rotate(a), M.translate(-args[1], -args[2])));
      } else {
        next = M.rotate(a);
      }
    } else if (name === 'skewX') {
      const t = Math.tan((args[0] || 0) * Math.PI / 180);
      next = [1, 0, t, 1, 0, 0];
    } else if (name === 'skewY') {
      const t = Math.tan((args[0] || 0) * Math.PI / 180);
      next = [1, t, 0, 1, 0, 0];
    } else {
      next = M.identity();
    }
    m = M.multiply(m, next);
  }
  return m;
}

/* =========================================================================
 *  SVG PATH PARSER
 *    parsePathData(d) -> array of {cmd, args} commands
 *    interpretPath(commands) -> array of subpaths { commands:[['M',x,y],['C',...],['Z']?], closed }
 * ======================================================================= */

function parsePathData(d) {
  const tokens = [];
  const re = /([MmLlHhVvZzQqTtCcSsAa])|(-?(?:\d+\.\d*|\.\d+|\d+)(?:[eE][-+]?\d+)?)/g;
  let m;
  while ((m = re.exec(d))) {
    if (m[1]) tokens.push({ type: 'cmd', value: m[1] });
    else tokens.push({ type: 'num', value: parseFloat(m[2]) });
  }

  const argCounts = { M:2, m:2, L:2, l:2, H:1, h:1, V:1, v:1, Z:0, z:0, Q:4, q:4, T:2, t:2, C:6, c:6, S:4, s:4, A:7, a:7 };
  const commands = [];
  let i = 0;
  while (i < tokens.length) {
    if (tokens[i].type !== 'cmd') throw new Error('Path data must start with a command');
    const cmd = tokens[i].value;
    i++;
    const argCount = argCounts[cmd];
    if (argCount === 0) {
      commands.push({ cmd, args: [] });
      continue;
    }
    let first = true;
    while (i < tokens.length && tokens[i].type === 'num') {
      if (i + argCount > tokens.length) throw new Error(`Not enough args for ${cmd}`);
      const args = [];
      for (let j = 0; j < argCount; j++) {
        if (tokens[i].type !== 'num') throw new Error(`Expected number for ${cmd}`);
        args.push(tokens[i].value);
        i++;
      }
      // After M/m, subsequent implicit commands are L/l
      const effective = first ? cmd : (cmd === 'M' ? 'L' : cmd === 'm' ? 'l' : cmd);
      commands.push({ cmd: effective, args });
      first = false;
    }
  }
  return commands;
}

function interpretPath(commands) {
  const subpaths = [];
  let current = null;
  let cx = 0, cy = 0, sx = 0, sy = 0;
  let lastCubic = null, lastQuad = null;

  function start(x, y) {
    if (current) subpaths.push(current);
    current = { commands: [['M', x, y]], closed: false };
    sx = x; sy = y; cx = x; cy = y;
    lastCubic = null; lastQuad = null;
  }

  for (const { cmd, args } of commands) {
    switch (cmd) {
      case 'M': start(args[0], args[1]); break;
      case 'm': start(cx + args[0], cy + args[1]); break;
      case 'L': current.commands.push(['L', args[0], args[1]]); cx = args[0]; cy = args[1]; lastCubic = null; lastQuad = null; break;
      case 'l': cx += args[0]; cy += args[1]; current.commands.push(['L', cx, cy]); lastCubic = null; lastQuad = null; break;
      case 'H': current.commands.push(['L', args[0], cy]); cx = args[0]; lastCubic = null; lastQuad = null; break;
      case 'h': cx += args[0]; current.commands.push(['L', cx, cy]); lastCubic = null; lastQuad = null; break;
      case 'V': current.commands.push(['L', cx, args[0]]); cy = args[0]; lastCubic = null; lastQuad = null; break;
      case 'v': cy += args[0]; current.commands.push(['L', cx, cy]); lastCubic = null; lastQuad = null; break;
      case 'Z': case 'z':
        current.commands.push(['Z']); current.closed = true;
        cx = sx; cy = sy; lastCubic = null; lastQuad = null;
        break;
      case 'C': {
        const [x1, y1, x2, y2, x, y] = args;
        current.commands.push(['C', x1, y1, x2, y2, x, y]);
        lastCubic = [x2, y2]; cx = x; cy = y; lastQuad = null;
        break;
      }
      case 'c': {
        const [dx1, dy1, dx2, dy2, dx, dy] = args;
        const x1 = cx + dx1, y1 = cy + dy1, x2 = cx + dx2, y2 = cy + dy2, x = cx + dx, y = cy + dy;
        current.commands.push(['C', x1, y1, x2, y2, x, y]);
        lastCubic = [x2, y2]; cx = x; cy = y; lastQuad = null;
        break;
      }
      case 'S': {
        const [x2, y2, x, y] = args;
        const x1 = lastCubic ? 2*cx - lastCubic[0] : cx;
        const y1 = lastCubic ? 2*cy - lastCubic[1] : cy;
        current.commands.push(['C', x1, y1, x2, y2, x, y]);
        lastCubic = [x2, y2]; cx = x; cy = y; lastQuad = null;
        break;
      }
      case 's': {
        const [dx2, dy2, dx, dy] = args;
        const x2 = cx + dx2, y2 = cy + dy2, x = cx + dx, y = cy + dy;
        const x1 = lastCubic ? 2*cx - lastCubic[0] : cx;
        const y1 = lastCubic ? 2*cy - lastCubic[1] : cy;
        current.commands.push(['C', x1, y1, x2, y2, x, y]);
        lastCubic = [x2, y2]; cx = x; cy = y; lastQuad = null;
        break;
      }
      case 'Q': {
        const [x1, y1, x, y] = args;
        current.commands.push(['Q', x1, y1, x, y]);
        lastQuad = [x1, y1]; cx = x; cy = y; lastCubic = null;
        break;
      }
      case 'q': {
        const [dx1, dy1, dx, dy] = args;
        const x1 = cx + dx1, y1 = cy + dy1, x = cx + dx, y = cy + dy;
        current.commands.push(['Q', x1, y1, x, y]);
        lastQuad = [x1, y1]; cx = x; cy = y; lastCubic = null;
        break;
      }
      case 'T': {
        const [x, y] = args;
        const x1 = lastQuad ? 2*cx - lastQuad[0] : cx;
        const y1 = lastQuad ? 2*cy - lastQuad[1] : cy;
        current.commands.push(['Q', x1, y1, x, y]);
        lastQuad = [x1, y1]; cx = x; cy = y; lastCubic = null;
        break;
      }
      case 't': {
        const [dx, dy] = args;
        const x = cx + dx, y = cy + dy;
        const x1 = lastQuad ? 2*cx - lastQuad[0] : cx;
        const y1 = lastQuad ? 2*cy - lastQuad[1] : cy;
        current.commands.push(['Q', x1, y1, x, y]);
        lastQuad = [x1, y1]; cx = x; cy = y; lastCubic = null;
        break;
      }
      case 'A': case 'a': {
        const [rx, ry, xRot, largeArc, sweep, ax, ay] = args;
        const ex = cmd === 'A' ? ax : cx + ax;
        const ey = cmd === 'A' ? ay : cy + ay;
        const beziers = arcToCubicBeziers(cx, cy, rx, ry, xRot, largeArc, sweep, ex, ey);
        for (const [x1, y1, x2, y2, fx, fy] of beziers) current.commands.push(['C', x1, y1, x2, y2, fx, fy]);
        cx = ex; cy = ey; lastCubic = null; lastQuad = null;
        break;
      }
    }
  }
  if (current) subpaths.push(current);
  return subpaths;
}

function arcToCubicBeziers(x1, y1, rx, ry, xAxisRotationDeg, largeArcFlag, sweepFlag, x2, y2) {
  rx = Math.abs(rx); ry = Math.abs(ry);
  if (rx === 0 || ry === 0 || (x1 === x2 && y1 === y2)) return [];
  const phi = xAxisRotationDeg * Math.PI / 180;
  const cosPhi = Math.cos(phi), sinPhi = Math.sin(phi);
  const dx2 = (x1 - x2) / 2, dy2 = (y1 - y2) / 2;
  const x1p =  cosPhi * dx2 + sinPhi * dy2;
  const y1p = -sinPhi * dx2 + cosPhi * dy2;
  const lambda = (x1p*x1p)/(rx*rx) + (y1p*y1p)/(ry*ry);
  if (lambda > 1) { const s = Math.sqrt(lambda); rx *= s; ry *= s; }
  const rxs = rx*rx, rys = ry*ry, x1ps = x1p*x1p, y1ps = y1p*y1p;
  let radicant = (rxs * rys - rxs * y1ps - rys * x1ps) / (rxs * y1ps + rys * x1ps);
  radicant = Math.max(0, radicant);
  let coef = Math.sqrt(radicant);
  if (largeArcFlag === sweepFlag) coef = -coef;
  const cxp =  coef *  (rx * y1p) / ry;
  const cyp =  coef * -(ry * x1p) / rx;
  const cx = cosPhi * cxp - sinPhi * cyp + (x1 + x2) / 2;
  const cy = sinPhi * cxp + cosPhi * cyp + (y1 + y2) / 2;
  const ang = (ux, uy, vx, vy) => {
    const dot = ux*vx + uy*vy;
    const len = Math.hypot(ux, uy) * Math.hypot(vx, vy);
    let a = Math.acos(Math.max(-1, Math.min(1, dot/len)));
    if (ux*vy - uy*vx < 0) a = -a;
    return a;
  };
  const startA = ang(1, 0, (x1p - cxp)/rx, (y1p - cyp)/ry);
  let deltaA = ang((x1p - cxp)/rx, (y1p - cyp)/ry, (-x1p - cxp)/rx, (-y1p - cyp)/ry);
  if (!sweepFlag && deltaA > 0) deltaA -= 2*Math.PI;
  if (sweepFlag && deltaA < 0) deltaA += 2*Math.PI;
  const segs = Math.max(1, Math.ceil(Math.abs(deltaA) / (Math.PI/2)));
  const segA = deltaA / segs;
  const t = (4/3) * Math.tan(segA / 4);
  const out = [];
  for (let i = 0; i < segs; i++) {
    const a1 = startA + i * segA, a2 = startA + (i+1) * segA;
    const c1 = Math.cos(a1), s1 = Math.sin(a1);
    const c2 = Math.cos(a2), s2 = Math.sin(a2);
    const p1x = c1, p1y = s1;
    const p2x = c2, p2y = s2;
    const k1x = p1x - t * s1, k1y = p1y + t * c1;
    const k2x = p2x + t * s2, k2y = p2y - t * c2;
    const xform = (px, py) => {
      const sx = px * rx, sy = py * ry;
      return [cosPhi * sx - sinPhi * sy + cx, sinPhi * sx + cosPhi * sy + cy];
    };
    const [k1xt, k1yt] = xform(k1x, k1y);
    const [k2xt, k2yt] = xform(k2x, k2y);
    const [p2xt, p2yt] = xform(p2x, p2y);
    out.push([k1xt, k1yt, k2xt, k2yt, p2xt, p2yt]);
  }
  return out;
}

/* =========================================================================
 *  FLATTEN BEZIER SUBPATH -> POLYGON POINTS
 * ======================================================================= */

function flattenSubpathToPoly(subpath, tol) {
  const pts = [];
  let cx = 0, cy = 0;
  for (const c of subpath.commands) {
    if (c[0] === 'M') { cx = c[1]; cy = c[2]; pts.push([cx, cy]); }
    else if (c[0] === 'L') { cx = c[1]; cy = c[2]; pts.push([cx, cy]); }
    else if (c[0] === 'C') { flattenCubic(cx, cy, c[1], c[2], c[3], c[4], c[5], c[6], tol, pts); cx = c[5]; cy = c[6]; }
    else if (c[0] === 'Q') { flattenQuad(cx, cy, c[1], c[2], c[3], c[4], tol, pts); cx = c[3]; cy = c[4]; }
  }
  // Drop duplicate trailing vertex if it equals the first (closePath handles it visually).
  if (pts.length > 1) {
    const a = pts[0], b = pts[pts.length-1];
    if (Math.abs(a[0]-b[0]) < 1e-6 && Math.abs(a[1]-b[1]) < 1e-6) pts.pop();
  }
  return pts;
}

function flattenCubic(x0, y0, x1, y1, x2, y2, x3, y3, tol, out) {
  const stack = [[x0, y0, x1, y1, x2, y2, x3, y3]];
  while (stack.length) {
    const [a, b, c, d, e, f, g, h] = stack.pop();
    const ux = 3*c - 2*a - g, uy = 3*d - 2*b - h;
    const vx = 3*e - 2*g - a, vy = 3*f - 2*h - b;
    const flatness = Math.max(ux*ux + uy*uy, vx*vx + vy*vy);
    if (flatness <= tol*tol*16) {
      out.push([g, h]);
    } else {
      const m12x=(a+c)/2, m12y=(b+d)/2;
      const m23x=(c+e)/2, m23y=(d+f)/2;
      const m34x=(e+g)/2, m34y=(f+h)/2;
      const m123x=(m12x+m23x)/2, m123y=(m12y+m23y)/2;
      const m234x=(m23x+m34x)/2, m234y=(m23y+m34y)/2;
      const mx=(m123x+m234x)/2, my=(m123y+m234y)/2;
      stack.push([mx, my, m234x, m234y, m34x, m34y, g, h]);
      stack.push([a, b, m12x, m12y, m123x, m123y, mx, my]);
    }
  }
}

function flattenQuad(x0, y0, x1, y1, x2, y2, tol, out) {
  const stack = [[x0, y0, x1, y1, x2, y2]];
  while (stack.length) {
    const [a, b, c, d, e, f] = stack.pop();
    const ux = 2*c - a - e, uy = 2*d - b - f;
    const flatness = ux*ux + uy*uy;
    if (flatness <= tol*tol*16) {
      out.push([e, f]);
    } else {
      const m12x=(a+c)/2, m12y=(b+d)/2;
      const m23x=(c+e)/2, m23y=(d+f)/2;
      const mx=(m12x+m23x)/2, my=(m12y+m23y)/2;
      stack.push([mx, my, m23x, m23y, e, f]);
      stack.push([a, b, m12x, m12y, mx, my]);
    }
  }
}

/* =========================================================================
 *  SVG -> PARTS
 * ======================================================================= */

function parseSvgString(svgText) {
  const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
  const errs = doc.querySelectorAll('parsererror');
  if (errs.length) throw new Error('Invalid SVG: ' + errs[0].textContent.replace(/\s+/g, ' ').slice(0, 200));
  const root = doc.documentElement;
  if (!root || root.nodeName.toLowerCase() !== 'svg') throw new Error('Root must be <svg>');

  const warnings = [];
  const elements = [];
  walk(root, M.identity(), elements, warnings);
  return { elements, warnings };
}

function walk(node, parentMatrix, out, warnings) {
  if (!node.getAttribute) return;
  let mat = parentMatrix;
  const tx = node.getAttribute('transform');
  if (tx) mat = M.multiply(parentMatrix, parseTransformAttribute(tx));

  const tag = node.nodeName.toLowerCase();
  if (tag === 'svg' || tag === 'g' || tag === 'symbol' || tag === 'defs') {
    for (const child of node.children) walk(child, mat, out, warnings);
    return;
  }
  if (tag === 'path') {
    const d = node.getAttribute('d');
    if (d) out.push({ tag, d, matrix: mat });
  } else if (tag === 'circle') {
    out.push({ tag, cx: +node.getAttribute('cx') || 0, cy: +node.getAttribute('cy') || 0, r: +node.getAttribute('r') || 0, matrix: mat });
  } else if (tag === 'ellipse') {
    out.push({ tag, cx: +node.getAttribute('cx') || 0, cy: +node.getAttribute('cy') || 0, rx: +node.getAttribute('rx') || 0, ry: +node.getAttribute('ry') || 0, matrix: mat });
  } else if (tag === 'rect') {
    out.push({ tag, x: +node.getAttribute('x') || 0, y: +node.getAttribute('y') || 0, w: +node.getAttribute('width') || 0, h: +node.getAttribute('height') || 0, matrix: mat });
  } else if (tag === 'line') {
    out.push({ tag, x1: +node.getAttribute('x1') || 0, y1: +node.getAttribute('y1') || 0, x2: +node.getAttribute('x2') || 0, y2: +node.getAttribute('y2') || 0, matrix: mat });
  } else if (tag === 'polygon' || tag === 'polyline') {
    const ptsAttr = node.getAttribute('points') || '';
    const nums = ptsAttr.split(/[\s,]+/).filter(s => s.length).map(Number);
    const pts = [];
    for (let i = 0; i + 1 < nums.length; i += 2) pts.push([nums[i], nums[i+1]]);
    out.push({ tag, pts, matrix: mat });
  } else {
    // Skip unsupported tags but warn for the visible/structural ones.
    if (!['title', 'desc', 'metadata', 'style', 'use'].includes(tag)) {
      warnings.push(`Unsupported element <${tag}> ignored`);
    }
  }
}

function elementsToParts(elements, tolerance, curveMode) {
  const parts = [];
  for (const el of elements) {
    if (el.tag === 'path') {
      const cmds = parsePathData(el.d);
      const subs = interpretPath(cmds);
      for (const sub of subs) {
        // Transform the subpath's commands by el.matrix.
        const xformed = transformSubpath(sub, el.matrix);
        if (curveMode === 'curves') {
          // Keep as Bezier subpath.
          parts.push({ kind: 'curvepath', subpath: xformed.commands, color: 'col', visible: true, _src: { tag: 'path', subpath: xformed.commands } });
        } else {
          const pts = flattenSubpathToPoly(xformed, tolerance);
          if (pts.length >= 2) parts.push({ kind: 'poly', pts, color: 'col', visible: true, _src: { tag: 'path', subpath: xformed.commands } });
        }
      }
    } else if (el.tag === 'circle') {
      const sx = M.scaleX(el.matrix), sy = M.scaleY(el.matrix);
      const [cx, cy] = M.apply(el.matrix, el.cx, el.cy);
      if (Math.abs(sx - sy) < 1e-4) {
        parts.push({ kind: 'circle', cx, cy, r: el.r * sx, color: 'col', visible: true, _src: { tag: 'circle' } });
      } else {
        parts.push({ kind: 'ellipse', cx, cy, rx: el.r * sx, ry: el.r * sy, color: 'col', visible: true, _src: { tag: 'circle' } });
      }
    } else if (el.tag === 'ellipse') {
      const sx = M.scaleX(el.matrix), sy = M.scaleY(el.matrix);
      const [cx, cy] = M.apply(el.matrix, el.cx, el.cy);
      if (M.hasNoRotation(el.matrix)) {
        parts.push({ kind: 'ellipse', cx, cy, rx: el.rx * sx, ry: el.ry * sy, color: 'col', visible: true, _src: { tag: 'ellipse' } });
      } else {
        // Polygonize a rotated ellipse.
        const pts = sampleEllipse(el.cx, el.cy, el.rx, el.ry, 64).map(p => M.apply(el.matrix, p[0], p[1]));
        parts.push({ kind: 'poly', pts, color: 'col', visible: true, _src: { tag: 'ellipse' } });
      }
    } else if (el.tag === 'rect') {
      if (M.hasNoRotation(el.matrix)) {
        const [x0, y0] = M.apply(el.matrix, el.x, el.y);
        const sx = M.scaleX(el.matrix), sy = M.scaleY(el.matrix);
        const w = el.w * sx, h = el.h * sy;
        // Phantom uses (x,y) as CENTER for rect; convert top-left -> center.
        parts.push({ kind: 'rect', x: x0 + w/2, y: y0 + h/2, w, h, color: 'col', visible: true, _src: { tag: 'rect' } });
      } else {
        const corners = [[el.x, el.y], [el.x+el.w, el.y], [el.x+el.w, el.y+el.h], [el.x, el.y+el.h]];
        const pts = corners.map(p => M.apply(el.matrix, p[0], p[1]));
        parts.push({ kind: 'poly', pts, color: 'col', visible: true, _src: { tag: 'rect' } });
      }
    } else if (el.tag === 'line') {
      const pts = [[el.x1, el.y1], [el.x2, el.y2]].map(p => M.apply(el.matrix, p[0], p[1]));
      parts.push({ kind: 'poly', pts, color: 'col', visible: true, _src: { tag: 'line' } });
    } else if (el.tag === 'polygon' || el.tag === 'polyline') {
      const pts = el.pts.map(p => M.apply(el.matrix, p[0], p[1]));
      if (pts.length >= 2) parts.push({ kind: 'poly', pts, color: 'col', visible: true, _src: { tag: el.tag } });
    }
  }
  return parts;
}

function transformSubpath(sub, mat) {
  const out = { commands: [], closed: sub.closed };
  for (const c of sub.commands) {
    if (c[0] === 'M' || c[0] === 'L') {
      const [x, y] = M.apply(mat, c[1], c[2]);
      out.commands.push([c[0], x, y]);
    } else if (c[0] === 'C') {
      const [a1, b1] = M.apply(mat, c[1], c[2]);
      const [a2, b2] = M.apply(mat, c[3], c[4]);
      const [a3, b3] = M.apply(mat, c[5], c[6]);
      out.commands.push(['C', a1, b1, a2, b2, a3, b3]);
    } else if (c[0] === 'Q') {
      const [a1, b1] = M.apply(mat, c[1], c[2]);
      const [a2, b2] = M.apply(mat, c[3], c[4]);
      out.commands.push(['Q', a1, b1, a2, b2]);
    } else if (c[0] === 'Z') {
      out.commands.push(['Z']);
    }
  }
  return out;
}

function sampleEllipse(cx, cy, rx, ry, steps) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    pts.push([cx + Math.cos(a) * rx, cy + Math.sin(a) * ry]);
  }
  return pts;
}

/* =========================================================================
 *  POST-PROCESS PARTS:  rotate, center, scale
 *  Returns a NEW list of parts in final coords, leaving state.parts untouched.
 * ======================================================================= */

function transformedParts() {
  const inputRot = state.inputRotationDeg * Math.PI / 180;
  const baseMat = M.rotate(inputRot);
  // 1) Apply input rotation
  let parts = state.parts.map(p => transformPart(p, baseMat));
  // 2) Auto-center
  if (state.autoCenter) {
    const bb = bbox(parts);
    if (bb) {
      const tx = -(bb.minX + bb.maxX) / 2;
      const ty = -(bb.minY + bb.maxY) / 2;
      parts = parts.map(p => transformPart(p, M.translate(tx, ty)));
    }
  }
  // 3) Apply target-size scale
  if (Math.abs(state.targetSize - 1) > 1e-6) {
    parts = parts.map(p => transformPart(p, M.scale(state.targetSize)));
  }
  return parts;
}

function transformPart(part, mat) {
  // Preserve metadata
  const meta = { color: part.color, visible: part.visible, _src: part._src };
  if (part.kind === 'poly') {
    return { kind: 'poly', pts: part.pts.map(([x, y]) => M.apply(mat, x, y)), ...meta };
  }
  if (part.kind === 'circle') {
    const [cx, cy] = M.apply(mat, part.cx, part.cy);
    return { kind: 'circle', cx, cy, r: part.r * M.scaleX(mat), ...meta };
  }
  if (part.kind === 'ellipse') {
    if (M.hasNoRotation(mat)) {
      const [cx, cy] = M.apply(mat, part.cx, part.cy);
      return { kind: 'ellipse', cx, cy, rx: part.rx * M.scaleX(mat), ry: part.ry * M.scaleY(mat), ...meta };
    }
    // Rotated ellipse -> polygonize
    const pts = sampleEllipse(part.cx, part.cy, part.rx, part.ry, 64).map(p => M.apply(mat, p[0], p[1]));
    return { kind: 'poly', pts, ...meta };
  }
  if (part.kind === 'rect') {
    if (M.hasNoRotation(mat)) {
      const [cx, cy] = M.apply(mat, part.x, part.y);
      return { kind: 'rect', x: cx, y: cy, w: part.w * M.scaleX(mat), h: part.h * M.scaleY(mat), ...meta };
    }
    // Rotated rect -> polygonize
    const corners = [
      [part.x - part.w/2, part.y - part.h/2],
      [part.x + part.w/2, part.y - part.h/2],
      [part.x + part.w/2, part.y + part.h/2],
      [part.x - part.w/2, part.y + part.h/2],
    ];
    const pts = corners.map(p => M.apply(mat, p[0], p[1]));
    return { kind: 'poly', pts, ...meta };
  }
  if (part.kind === 'curvepath') {
    const sub = transformSubpath({ commands: part.subpath, closed: false }, mat);
    return { kind: 'curvepath', subpath: sub.commands, ...meta };
  }
  return part;
}

function bbox(parts) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity, has = false;
  for (const p of parts) {
    if (!p.visible) continue;
    if (p.kind === 'poly') {
      for (const [x, y] of p.pts) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; has = true; }
    } else if (p.kind === 'circle') {
      if (p.cx - p.r < minX) minX = p.cx - p.r;
      if (p.cx + p.r > maxX) maxX = p.cx + p.r;
      if (p.cy - p.r < minY) minY = p.cy - p.r;
      if (p.cy + p.r > maxY) maxY = p.cy + p.r;
      has = true;
    } else if (p.kind === 'ellipse') {
      if (p.cx - p.rx < minX) minX = p.cx - p.rx;
      if (p.cx + p.rx > maxX) maxX = p.cx + p.rx;
      if (p.cy - p.ry < minY) minY = p.cy - p.ry;
      if (p.cy + p.ry > maxY) maxY = p.cy + p.ry;
      has = true;
    } else if (p.kind === 'rect') {
      if (p.x - p.w/2 < minX) minX = p.x - p.w/2;
      if (p.x + p.w/2 > maxX) maxX = p.x + p.w/2;
      if (p.y - p.h/2 < minY) minY = p.y - p.h/2;
      if (p.y + p.h/2 > maxY) maxY = p.y + p.h/2;
      has = true;
    } else if (p.kind === 'curvepath') {
      // approximate via control polygon
      for (const c of p.subpath) {
        for (let i = 1; i + 1 < c.length; i += 2) {
          const x = c[i], y = c[i+1];
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
          has = true;
        }
      }
    }
  }
  if (!has) return null;
  return { minX, minY, maxX, maxY };
}

function maxRadius(parts) {
  let m = 0;
  for (const p of parts) {
    if (!p.visible) continue;
    if (p.kind === 'poly') for (const [x, y] of p.pts) m = Math.max(m, Math.hypot(x, y));
    else if (p.kind === 'circle') m = Math.max(m, Math.hypot(p.cx, p.cy) + p.r);
    else if (p.kind === 'ellipse') m = Math.max(m, Math.hypot(p.cx, p.cy) + Math.max(p.rx, p.ry));
    else if (p.kind === 'rect') {
      const corners = [[p.x-p.w/2,p.y-p.h/2],[p.x+p.w/2,p.y-p.h/2],[p.x+p.w/2,p.y+p.h/2],[p.x-p.w/2,p.y+p.h/2]];
      for (const [x, y] of corners) m = Math.max(m, Math.hypot(x, y));
    } else if (p.kind === 'curvepath') {
      for (const c of p.subpath) for (let i = 1; i + 1 < c.length; i += 2) m = Math.max(m, Math.hypot(c[i], c[i+1]));
    }
  }
  return m;
}

/* =========================================================================
 *  COLLISION POLY (for curves mode preview)
 * ======================================================================= */

function partToCollisionPoly(part, tol) {
  if (part.kind !== 'curvepath') return null;
  const pts = flattenSubpathToPoly({ commands: part.subpath, closed: false }, tol);
  return pts.length >= 2 ? pts : null;
}

/* =========================================================================
 *  PREVIEW RENDERER
 * ======================================================================= */

const cv = els.preview;
const cx = cv.getContext('2d');
let lastFrameTime = 0;

function render() {
  const w = cv.width, h = cv.height;
  cx.save();
  cx.fillStyle = '#000';
  cx.fillRect(0, 0, w, h);

  cx.translate(w/2, h/2);
  const scale = state.preview.defScale;
  cx.scale(scale, scale);
  const angle = state.preview.rotationDeg * Math.PI / 180;
  cx.rotate(angle);

  const parts = transformedParts();

  cx.shadowColor = state.col;
  cx.shadowBlur = state.shadowBlur;
  cx.lineWidth = state.lineWidth;
  cx.lineJoin = 'miter';
  cx.lineCap = 'butt';

  for (const p of parts) {
    if (!p.visible) continue;
    cx.strokeStyle = p.color === 'col2' ? state.col2 : state.col;
    cx.shadowColor = cx.strokeStyle;
    drawPart(p);
  }

  cx.shadowBlur = 0;
  cx.shadowColor = 'transparent';

  // Bounds circle
  if (state.preview.showBounds) {
    cx.save();
    cx.rotate(-angle);
    cx.strokeStyle = '#3fa9f5';
    cx.setLineDash([4 / scale, 3 / scale]);
    cx.lineWidth = 1 / scale;
    cx.beginPath();
    cx.arc(0, 0, state.boundsR, 0, Math.PI * 2);
    cx.stroke();
    cx.setLineDash([]);
    cx.restore();
  }

  // Collision polygon overlay (curves mode)
  if (state.preview.showCollisionPoly && state.curveMode === 'curves') {
    cx.strokeStyle = 'rgba(255, 100, 100, 0.6)';
    cx.lineWidth = 1 / scale;
    for (const p of parts) {
      if (p.kind !== 'curvepath') continue;
      const poly = partToCollisionPoly(p, state.tolerance);
      if (!poly) continue;
      cx.beginPath();
      poly.forEach(([x, y], i) => i ? cx.lineTo(x, y) : cx.moveTo(x, y));
      cx.closePath();
      cx.stroke();
    }
  }

  cx.restore();
}

function drawPart(p) {
  if (p.kind === 'circle') {
    cx.beginPath();
    cx.arc(p.cx, p.cy, p.r, 0, Math.PI * 2);
    cx.stroke();
  } else if (p.kind === 'ellipse') {
    cx.beginPath();
    cx.ellipse(p.cx, p.cy, p.rx, p.ry, 0, 0, Math.PI * 2);
    cx.stroke();
  } else if (p.kind === 'rect') {
    cx.beginPath();
    cx.rect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
    cx.stroke();
  } else if (p.kind === 'poly') {
    if (p.pts.length < 2) return;
    cx.beginPath();
    p.pts.forEach(([x, y], i) => i ? cx.lineTo(x, y) : cx.moveTo(x, y));
    cx.closePath();
    cx.stroke();
  } else if (p.kind === 'curvepath') {
    cx.beginPath();
    for (const c of p.subpath) {
      if (c[0] === 'M') cx.moveTo(c[1], c[2]);
      else if (c[0] === 'L') cx.lineTo(c[1], c[2]);
      else if (c[0] === 'C') cx.bezierCurveTo(c[1], c[2], c[3], c[4], c[5], c[6]);
      else if (c[0] === 'Q') cx.quadraticCurveTo(c[1], c[2], c[3], c[4]);
      else if (c[0] === 'Z') cx.closePath();
    }
    cx.stroke();
  }
}

function frame(t) {
  const dt = lastFrameTime ? (t - lastFrameTime) / 1000 : 0;
  lastFrameTime = t;
  if (state.preview.autoRotate) {
    state.preview.rotationDeg = (state.preview.rotationDeg + state.preview.spinRate * dt * 180 / Math.PI) % 360;
    if (state.preview.rotationDeg < 0) state.preview.rotationDeg += 360;
    els.rotation.value = state.preview.rotationDeg.toFixed(0);
    els.rotationVal.textContent = `${state.preview.rotationDeg.toFixed(0)}°`;
  }
  render();
  requestAnimationFrame(frame);
}

/* =========================================================================
 *  DRAG-TO-RESIZE boundsR ON PREVIEW
 * ======================================================================= */

let drag = null;
els.preview.addEventListener('mousedown', (e) => {
  const rect = cv.getBoundingClientRect();
  const px = (e.clientX - rect.left) - cv.width / 2;
  const py = (e.clientY - rect.top) - cv.height / 2;
  const r = Math.hypot(px, py) / state.preview.defScale;
  if (state.preview.showBounds && Math.abs(r - state.boundsR) < 6 / state.preview.defScale) {
    drag = { startR: state.boundsR, startDist: r };
  }
});
window.addEventListener('mousemove', (e) => {
  if (!drag) return;
  const rect = cv.getBoundingClientRect();
  const px = (e.clientX - rect.left) - cv.width / 2;
  const py = (e.clientY - rect.top) - cv.height / 2;
  const r = Math.hypot(px, py) / state.preview.defScale;
  state.boundsR = Math.max(1, drag.startR + (r - drag.startDist));
  els.boundsR.value = state.boundsR.toFixed(1);
  scheduleRefresh();
});
window.addEventListener('mouseup', () => { drag = null; });

/* =========================================================================
 *  CODE OUTPUT
 * ======================================================================= */

function buildOutput() {
  const parts = transformedParts().filter(p => p.visible);
  const usesCol2 = parts.some(p => p.color === 'col2');
  const isCurves = state.curveMode === 'curves' && parts.some(p => p.kind === 'curvepath');

  // Build hull.parts (collision). Curves get flattened for collision.
  const hullParts = [];
  for (const p of parts) {
    if (p.kind === 'curvepath') {
      const flat = partToCollisionPoly(p, state.tolerance);
      if (flat) hullParts.push({ kind: 'poly', pts: flat });
    } else if (p.kind === 'poly') {
      hullParts.push({ kind: 'poly', pts: p.pts });
    } else {
      hullParts.push(stripMeta(p));
    }
  }

  const angleAccess = pickAngleAccess(state.hullAngle);
  const hullStr = serializeHull(state.hullAngle, state.boundsR, hullParts);
  const drawEncStr = buildDrawEnc(parts, isCurves, usesCol2, angleAccess);

  return [
    '{',
    `  id: 'newEnemy',                                  // PLACEHOLDER`,
    `  className:'NewEnemy', type:ENEMY_TYPES.FIGHTER, typeName:'Fighter', // PLACEHOLDER`,
    `  name:'NEWENEMY-CLASS FIGHTER',                   // PLACEHOLDER`,
    `  col:'${state.col}', col2:'${state.col2}',`,
    `  sc:160, energy:false, energyMax:20, energyRegenPerSec:4, spinRate:0, // PLACEHOLDER`,
    `  hull:${hullStr},`,
    `  enc:{cnt:1, hp:20, spd:3.5, turn:.06, r:9, col:'${state.col}', col2:'${state.col2}', // PLACEHOLDER`,
    `    ai:{preferred:150, band:34, strafe:.02, pursuit:{lead:.3, offset:100, weave:.6, flipFrames:120, thrust:.05, turnMult:1}}, // PLACEHOLDER`,
    `    fire:{wpn:'mass driver small', mode:'aim', count:1, spread:0, offset:10, minRange:35, arc:1}}, // PLACEHOLDER`,
    `  ${drawEncStr}`,
    '}',
  ].join('\n');
}

function pickAngleAccess(mode) {
  // Returns { setup: 'const a=...;' | '', rotate: 'a' | 'e.spin' | '0', invRotate: '-a' | '-e.spin' | null }
  if (mode === 'spin')   return { setup: '', rotate: 'e.spin', invRotate: '-e.spin' };
  if (mode === 'combat') return { setup: 'const a=combatFacingAngle(e);', rotate: 'a', invRotate: '-a' };
  if (mode === 'flight') return { setup: 'const a=flightAngle(e);', rotate: 'a', invRotate: '-a' };
  return { setup: '', rotate: '0', invRotate: null };
}

function serializeHull(angle, boundsR, parts) {
  const partStrs = parts.map(serializeHullPart).join(', ');
  return `{angle:'${angle}', boundsR:${num(boundsR)}, parts:[${partStrs}]}`;
}

function serializeHullPart(p) {
  if (p.kind === 'circle')  return `{kind:'circle', x:${num(p.cx)}, y:${num(p.cy)}, r:${num(p.r)}}`;
  if (p.kind === 'ellipse') return `{kind:'ellipse', x:${num(p.cx)}, y:${num(p.cy)}, rx:${num(p.rx)}, ry:${num(p.ry)}}`;
  if (p.kind === 'rect')    return `{kind:'rect', x:${num(p.x)}, y:${num(p.y)}, w:${num(p.w)}, h:${num(p.h)}}`;
  if (p.kind === 'poly')    return `{kind:'poly', pts:[${p.pts.map(pt => `[${num(pt[0])},${num(pt[1])}]`).join(',')}]}`;
  return '';
}

function buildDrawEnc(parts, isCurves, usesCol2, angle) {
  const lines = [];
  lines.push(`drawEnc(e){`);
  lines.push(`    const ec=this.enc;${angle.setup ? ' ' + angle.setup : ''}`);
  lines.push(`    cx.save();cx.translate(e.x,e.y);cx.rotate(${angle.rotate});`);
  if (!isCurves && !usesCol2) {
    lines.push(`    cx.strokeStyle=ec.col;cx.shadowColor=ec.col;cx.shadowBlur=sb(${state.shadowBlur});cx.lineWidth=${num(state.lineWidth)};`);
    lines.push(`    withEnemyBodyScale(this,e,()=>drawEnemyHull(this));`);
  } else {
    lines.push(`    cx.shadowColor=ec.col;cx.shadowBlur=sb(${state.shadowBlur});cx.lineWidth=${num(state.lineWidth)};`);
    lines.push(`    withEnemyBodyScale(this,e,()=>{`);
    // Group consecutive parts by color so we set strokeStyle as little as possible.
    let lastColor = null;
    for (const p of parts) {
      const colorVar = p.color === 'col2' ? 'ec.col2' : 'ec.col';
      if (colorVar !== lastColor) {
        lines.push(`      cx.strokeStyle=${colorVar};cx.shadowColor=${colorVar};`);
        lastColor = colorVar;
      }
      lines.push(`      ${partToCanvasCalls(p)}`);
    }
    lines.push(`    });`);
  }
  if (angle.invRotate !== null) {
    lines.push(`    if(e.hp<e.mhp){cx.save();cx.rotate(${angle.invRotate});drawEnemyHealthBar(e,ec.col);cx.restore();}`);
  } else {
    lines.push(`    if(e.hp<e.mhp){drawEnemyHealthBar(e,ec.col);}`);
  }
  lines.push(`    cx.restore();`);
  lines.push(`  }`);
  return lines.join('\n  ');
}

function partToCanvasCalls(p) {
  if (p.kind === 'circle')  return `cx.beginPath();cx.arc(${num(p.cx)},${num(p.cy)},${num(p.r)},0,Math.PI*2);cx.stroke();`;
  if (p.kind === 'ellipse') return `cx.beginPath();cx.ellipse(${num(p.cx)},${num(p.cy)},${num(p.rx)},${num(p.ry)},0,0,Math.PI*2);cx.stroke();`;
  if (p.kind === 'rect')    return `cx.beginPath();cx.rect(${num(p.x - p.w/2)},${num(p.y - p.h/2)},${num(p.w)},${num(p.h)});cx.stroke();`;
  if (p.kind === 'poly') {
    let s = 'cx.beginPath();';
    p.pts.forEach((pt, i) => { s += i ? `cx.lineTo(${num(pt[0])},${num(pt[1])});` : `cx.moveTo(${num(pt[0])},${num(pt[1])});`; });
    s += 'cx.closePath();cx.stroke();';
    return s;
  }
  if (p.kind === 'curvepath') {
    let s = 'cx.beginPath();';
    for (const c of p.subpath) {
      if      (c[0] === 'M') s += `cx.moveTo(${num(c[1])},${num(c[2])});`;
      else if (c[0] === 'L') s += `cx.lineTo(${num(c[1])},${num(c[2])});`;
      else if (c[0] === 'C') s += `cx.bezierCurveTo(${num(c[1])},${num(c[2])},${num(c[3])},${num(c[4])},${num(c[5])},${num(c[6])});`;
      else if (c[0] === 'Q') s += `cx.quadraticCurveTo(${num(c[1])},${num(c[2])},${num(c[3])},${num(c[4])});`;
      else if (c[0] === 'Z') s += 'cx.closePath();';
    }
    s += 'cx.stroke();';
    return s;
  }
  return '';
}

function num(v) {
  if (!Number.isFinite(v)) return '0';
  // Round to 2 decimals; trim trailing zeros.
  const r = Math.round(v * 100) / 100;
  return Object.is(r, -0) ? '0' : String(r);
}

function stripMeta(p) {
  const { color, visible, _src, ...rest } = p;
  return rest;
}

/* =========================================================================
 *  LOAD EXISTING ENEMY
 * ======================================================================= */

function loadExistingEnemy(code) {
  const trimmed = code.trim().replace(/[,;]\s*$/, '');
  const wrapped = `"use strict"; return (${trimmed});`;
  // Allow pasting entries copied from data/enemies.js where enum constants
  // are used (e.g. ENEMY_CLASS_IDS.MORRIGAN, ENEMY_TYPES.DESTROYER).
  const enumProxy = new Proxy(Object.create(null), {
    get(_target, prop) {
      if (typeof prop !== 'string') return undefined;
      return prop.toLowerCase();
    },
  });
  let obj;
  try {
    obj = new Function('ENEMY_CLASS_IDS', 'ENEMY_TYPES', wrapped)(enumProxy, enumProxy);
  } catch (e) {
    throw new Error('Could not parse enemy entry: ' + e.message);
  }
  const result = { col: null, col2: null, hullAngle: 'spin', boundsR: 16, parts: [], lineWidth: 1.5, shadowBlur: 10, warnings: [] };
  if (typeof obj.col === 'string') result.col = obj.col;
  if (typeof obj.col2 === 'string') result.col2 = obj.col2;
  if (obj.hull) {
    if (obj.hull.angle) result.hullAngle = obj.hull.angle;
    if (typeof obj.hull.boundsR === 'number') result.boundsR = obj.hull.boundsR;
    if (Array.isArray(obj.hull.parts)) {
      for (const p of obj.hull.parts) {
        if (p.kind === 'circle') result.parts.push({ kind: 'circle', cx: p.x || 0, cy: p.y || 0, r: p.r || 0, color: 'col', visible: true, _src: { tag: 'loaded' } });
        else if (p.kind === 'ellipse') result.parts.push({ kind: 'ellipse', cx: p.x || 0, cy: p.y || 0, rx: p.rx || 0, ry: p.ry || 0, color: 'col', visible: true, _src: { tag: 'loaded' } });
        else if (p.kind === 'rect') result.parts.push({ kind: 'rect', x: p.x || 0, y: p.y || 0, w: p.w || 0, h: p.h || 0, color: 'col', visible: true, _src: { tag: 'loaded' } });
        else if (p.kind === 'poly') result.parts.push({ kind: 'poly', pts: (p.pts || []).map(q => [q[0], q[1]]), color: 'col', visible: true, _src: { tag: 'loaded' } });
        else result.warnings.push(`Skipped hull part of unsupported kind '${p.kind}'`);
      }
    }
  }
  if (typeof obj.drawEnc === 'function') {
    const src = obj.drawEnc.toString();
    const lwM = src.match(/cx\.lineWidth\s*=\s*([\d.]+)/);
    if (lwM) result.lineWidth = parseFloat(lwM[1]);
    const sbM = src.match(/cx\.shadowBlur\s*=\s*sb\(\s*(\d+)\s*\)/);
    if (sbM) result.shadowBlur = parseInt(sbM[1]);
    // Detect extras: any moveTo/lineTo/arc beyond the standard drawEnemyHull call.
    const usesHullHelper = /drawEnemyHull\s*\(/.test(src);
    const hasInlineDraw = /cx\.(moveTo|lineTo|arc(?![A-Z])|bezierCurveTo|quadraticCurveTo|rect)\s*\(/.test(src);
    if (usesHullHelper && hasInlineDraw) {
      result.warnings.push('drawEnc contains extra cosmetic strokes alongside drawEnemyHull(); these will NOT be round-tripped (manually re-add after pasting).');
    }
    if (/ec\.col2/.test(src)) result.warnings.push('Original drawEnc references col2; assign parts to col2 manually after loading.');
  }
  return result;
}

/* =========================================================================
 *  PARTS LIST UI
 * ======================================================================= */

function renderPartsList() {
  els.partsList.innerHTML = '';
  if (state.parts.length === 0) {
    const li = document.createElement('li');
    li.innerHTML = '<span class="pname">No parts loaded</span>';
    els.partsList.appendChild(li);
    return;
  }
  state.parts.forEach((p, i) => {
    const li = document.createElement('li');
    const visId = `vis-${i}`, colId = `col-${i}-col`, col2Id = `col-${i}-col2`;
    li.innerHTML = `
      <input type="checkbox" id="${visId}" ${p.visible ? 'checked' : ''}>
      <span class="pname">${i+1}. ${describePart(p)}</span>
      <label style="margin:0"><input type="radio" name="color-${i}" id="${colId}" value="col" ${p.color === 'col' ? 'checked' : ''}> col</label>
      <label style="margin:0"><input type="radio" name="color-${i}" id="${col2Id}" value="col2" ${p.color === 'col2' ? 'checked' : ''}> col2</label>
    `;
    els.partsList.appendChild(li);
    li.querySelector(`#${visId}`).addEventListener('change', (e) => { p.visible = e.target.checked; scheduleRefresh(); });
    li.querySelector(`#${colId}`).addEventListener('change', () => { p.color = 'col'; scheduleRefresh(); });
    li.querySelector(`#${col2Id}`).addEventListener('change', () => { p.color = 'col2'; scheduleRefresh(); });
  });
}

function describePart(p) {
  if (p.kind === 'circle')    return `circle r=${num(p.r)}`;
  if (p.kind === 'ellipse')   return `ellipse rx=${num(p.rx)} ry=${num(p.ry)}`;
  if (p.kind === 'rect')      return `rect ${num(p.w)}×${num(p.h)}`;
  if (p.kind === 'poly')      return `poly (${p.pts.length} pts)`;
  if (p.kind === 'curvepath') return `curve (${p.subpath.length} segs)`;
  return p.kind;
}

/* =========================================================================
 *  WARNINGS
 * ======================================================================= */

function renderWarnings() {
  els.warnings.innerHTML = '';
  for (const w of state.warnings) {
    const div = document.createElement('div');
    div.className = w.kind === 'err' ? 'err' : 'warn';
    div.textContent = w.text;
    els.warnings.appendChild(div);
  }
}

function pushWarn(text, kind = 'warn') {
  state.warnings.push({ text, kind });
}

function clearWarnings() {
  state.warnings = [];
}

/* =========================================================================
 *  REFRESH SCHEDULER
 * ======================================================================= */

let refreshScheduled = false;
function scheduleRefresh() {
  if (refreshScheduled) return;
  refreshScheduled = true;
  queueMicrotask(() => {
    refreshScheduled = false;
    els.output.value = buildOutput();
    renderPartsList();
    renderWarnings();
  });
}

/* =========================================================================
 *  EVENT WIRING
 * ======================================================================= */

function bindRange(el, valEl, prop, parser = parseFloat, fmt = (v) => v.toFixed(2)) {
  el.addEventListener('input', () => {
    const v = parser(el.value);
    setNested(state, prop, v);
    if (valEl) valEl.textContent = fmt(v);
    scheduleRefresh();
  });
}

function setNested(obj, path, val) {
  const parts = path.split('.');
  let o = obj;
  for (let i = 0; i < parts.length - 1; i++) o = o[parts[i]];
  o[parts[parts.length - 1]] = val;
}

function parseSvgFromInput() {
  clearWarnings();
  const text = els.svgInput.value.trim();
  if (!text) { pushWarn('Paste SVG first', 'err'); renderWarnings(); return; }
  try {
    const { elements, warnings } = parseSvgString(text);
    for (const w of warnings) pushWarn(w);
    state.parts = elementsToParts(elements, state.tolerance, state.curveMode);
    if (state.parts.length === 0) pushWarn('No drawable elements found in SVG', 'err');
    // Auto-set boundsR to enclose the input at default size 1.0.
    const tp = transformedParts();
    const r = maxRadius(tp);
    if (r > 0) {
      state.boundsR = Math.max(1, Math.round(r * 10) / 10);
      els.boundsR.value = state.boundsR;
    }
    scheduleRefresh();
  } catch (e) {
    pushWarn(e.message, 'err');
    renderWarnings();
  }
}

els.pickSvgFileBtn.addEventListener('click', () => {
  els.svgFileInput.click();
});

els.svgFileInput.addEventListener('change', async () => {
  const file = els.svgFileInput.files && els.svgFileInput.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    els.svgInput.value = text;
    parseSvgFromInput();
  } catch (e) {
    clearWarnings();
    pushWarn(`Could not read SVG file: ${e.message}`, 'err');
    renderWarnings();
  } finally {
    // Allow selecting the same file again.
    els.svgFileInput.value = '';
  }
});

els.parseBtn.addEventListener('click', parseSvgFromInput);

els.loadBtn.addEventListener('click', () => {
  clearWarnings();
  const text = els.enemyInput.value.trim();
  if (!text) { pushWarn('Paste an enemy entry first', 'err'); renderWarnings(); return; }
  try {
    const r = loadExistingEnemy(text);
    state.parts = r.parts;
    state.boundsR = r.boundsR;
    state.hullAngle = r.hullAngle;
    state.lineWidth = r.lineWidth;
    state.shadowBlur = r.shadowBlur;
    if (r.col)  { state.col  = r.col;  els.col.value  = r.col; }
    if (r.col2) { state.col2 = r.col2; els.col2.value = r.col2; }
    els.boundsR.value = r.boundsR;
    els.hullAngle.value = r.hullAngle;
    els.lineWidth.value = r.lineWidth; els.lineWidthVal.textContent = r.lineWidth.toFixed(1);
    els.shadowBlur.value = r.shadowBlur; els.shadowBlurVal.textContent = String(r.shadowBlur);
    for (const w of r.warnings) pushWarn(w);
    scheduleRefresh();
  } catch (e) {
    pushWarn(e.message, 'err');
    renderWarnings();
  }
});

els.resetBtn.addEventListener('click', () => {
  state.parts = [];
  state.warnings = [];
  state.targetSize = 1; els.targetSize.value = 1; els.targetSizeVal.textContent = '1.00';
  state.inputRotationDeg = 0; els.inputRotation.value = 0; els.inputRotationVal.textContent = '0°';
  state.preview.rotationDeg = 0;
  els.svgInput.value = '';
  els.enemyInput.value = '';
  scheduleRefresh();
});

els.copyBtn.addEventListener('click', async () => {
  els.output.select();
  try {
    await navigator.clipboard.writeText(els.output.value);
    els.copyBtn.textContent = 'Copied!';
    setTimeout(() => { els.copyBtn.textContent = 'Copy'; }, 1200);
  } catch {
    document.execCommand && document.execCommand('copy');
  }
});

// Curves / mode
els.curveMode.addEventListener('change', () => {
  state.curveMode = els.curveMode.value;
  // Re-derive parts from any saved _src curvepath/poly so we can switch modes losslessly when source allows.
  // For SVG-loaded parts that have subpath in _src, we can rebuild.
  state.parts = state.parts.map(p => rebuildPartForMode(p, state.curveMode, state.tolerance));
  scheduleRefresh();
});

function rebuildPartForMode(p, mode, tol) {
  const src = p._src;
  if (!src || !src.subpath) return p;
  if (mode === 'curves') {
    return { kind: 'curvepath', subpath: src.subpath.map(c => c.slice()), color: p.color, visible: p.visible, _src: src };
  }
  // polygon
  const pts = flattenSubpathToPoly({ commands: src.subpath, closed: false }, tol);
  return { kind: 'poly', pts, color: p.color, visible: p.visible, _src: src };
}

bindRange(els.tolerance, els.toleranceVal, 'tolerance', parseFloat, v => v.toFixed(2));
els.tolerance.addEventListener('input', () => {
  // When tolerance changes, re-flatten polys that came from subpaths.
  if (state.curveMode === 'polygon') {
    state.parts = state.parts.map(p => rebuildPartForMode(p, 'polygon', state.tolerance));
  }
  scheduleRefresh();
});

els.hullAngle.addEventListener('change', () => { state.hullAngle = els.hullAngle.value; scheduleRefresh(); });
els.boundsR.addEventListener('input', () => { state.boundsR = parseFloat(els.boundsR.value) || 1; scheduleRefresh(); });

bindRange(els.targetSize, els.targetSizeVal, 'targetSize', parseFloat, v => v.toFixed(2));
els.autoCenter.addEventListener('change', () => { state.autoCenter = els.autoCenter.checked; scheduleRefresh(); });
bindRange(els.inputRotation, els.inputRotationVal, 'inputRotationDeg', parseFloat, v => `${v.toFixed(0)}°`);

els.col.addEventListener('input', () => { state.col = els.col.value; scheduleRefresh(); });
els.col2.addEventListener('input', () => { state.col2 = els.col2.value; scheduleRefresh(); });
bindRange(els.lineWidth, els.lineWidthVal, 'lineWidth', parseFloat, v => v.toFixed(1));
bindRange(els.shadowBlur, els.shadowBlurVal, 'shadowBlur', parseInt, v => String(v));

// Preview controls
els.autoRotate.addEventListener('change', () => { state.preview.autoRotate = els.autoRotate.checked; });
els.rotation.addEventListener('input', () => {
  state.preview.rotationDeg = parseFloat(els.rotation.value);
  els.rotationVal.textContent = `${state.preview.rotationDeg.toFixed(0)}°`;
  if (state.preview.autoRotate) { els.autoRotate.checked = false; state.preview.autoRotate = false; }
});
els.showBounds.addEventListener('change', () => { state.preview.showBounds = els.showBounds.checked; });
els.showCollisionPoly.addEventListener('change', () => { state.preview.showCollisionPoly = els.showCollisionPoly.checked; });
els.defScale.addEventListener('input', () => { state.preview.defScale = parseFloat(els.defScale.value) || 1; });
els.spinRate.addEventListener('input', () => {
  state.preview.spinRate = parseFloat(els.spinRate.value);
  els.spinRateVal.textContent = state.preview.spinRate.toFixed(2);
});

els.graphicType.addEventListener('change', () => { state.graphicType = els.graphicType.value; });

/* =========================================================================
 *  INIT
 * ======================================================================= */

scheduleRefresh();
requestAnimationFrame(frame);

</script>
</body>
</html>
